---
version: 2
updates:
- package-ecosystem: github-actions
  directory: "/"
  groups:
    github-actions:
      patterns:
      - "*"
  schedule:
    interval: monthly
  cooldown:
    default-days: 45
- package-ecosystem: gomod
  directory: "/themes/PaperMod"
  schedule:
    interval: monthly
  cooldown:
    default-days: 45
